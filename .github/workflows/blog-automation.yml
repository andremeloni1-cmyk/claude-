name: SEO Blog Automation

on:
  schedule:
    # Weekly, Monday 09:00 UTC. With max_posts_per_run: 1 that's ~one post a
    # week. Adjust the cron (https://crontab.guru) and config.yaml to change pace.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

# Needed so the job can commit the generated posts, images and state back.
permissions:
  contents: write

# Prevent overlapping runs from double-writing or double-publishing.
concurrency:
  group: blog-automation
  cancel-in-progress: false

jobs:
  blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Write new SEO post(s) and bundle images
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.BLOG_GDRIVE_FOLDER_ID || secrets.GDRIVE_FOLDER_ID }}
        run: python -m blog_automation.main

      # Commit + push BEFORE publishing so the images are live at their public
      # raw.githubusercontent.com URLs when Framer ingests them.
      - name: Commit generated posts and images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add published state/blog.json
          if ! git diff --staged --quiet; then
            git commit -m "Add generated blog post(s) [skip ci]"
            git push
          else
            echo "No new posts to commit."
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Framer publisher dependencies
        working-directory: framer
        run: npm install --no-audit --no-fund

      - name: Publish posts to Framer CMS
        working-directory: framer
        env:
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          FRAMER_COLLECTION_ID: ${{ secrets.FRAMER_COLLECTION_ID }}
          # Public base URL the committed images are served from.
          IMAGE_BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"
        run: node publish.mjs
