name: Pinterest Automation

on:
  schedule:
    # Every 6 hours. Adjust the cron as you like (https://crontab.guru).
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

# Needed so the job can commit the updated state file back to the repo.
permissions:
  contents: write

# Prevent overlapping runs from double-posting.
concurrency:
  group: pinterest-automation
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post new photos to Pinterest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          # Posting backend. Set POSTIZ_API_KEY to route posts through Postiz
          # (recommended — no Pinterest Standard-access review needed).
          POSTIZ_API_KEY: ${{ secrets.POSTIZ_API_KEY }}
          POSTIZ_BASE_URL: ${{ secrets.POSTIZ_BASE_URL }}
          POSTIZ_INTEGRATION_ID: ${{ secrets.POSTIZ_INTEGRATION_ID }}
          # Direct Pinterest API (only used if POSTIZ_API_KEY is unset). Set the
          # three refresh-token secrets (preferred), or a static PINTEREST_ACCESS_TOKEN.
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
        run: python -m pinterest_automation.main

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/posted.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "Update posted state [skip ci]"
          # main can advance between checkout and push — e.g. the blog
          # automation commits its bundles to main concurrently. Rebase onto the
          # latest main and retry so a competing push doesn't fail the run.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/${GITHUB_REF_NAME}…"
            git pull --rebase origin "${GITHUB_REF_NAME}"
          done
          echo "Failed to push updated state after multiple attempts." >&2
          exit 1
